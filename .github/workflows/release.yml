name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Write signing key
        shell: bash
        run: |
          mkdir -p src-tauri/keys
          echo "$TAURI_SIGNING_PRIVATE_KEY" > src-tauri/keys/nudge.key
          echo "Signing key written ($(wc -c < src-tauri/keys/nudge.key) bytes)"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY_PATH: src-tauri/keys/nudge.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npx tauri build

      - name: List build output
        run: dir src-tauri\target\release\bundle\nsis\
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: src-tauri/target/release/bundle/nsis/

  publish-release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: artifacts

      - name: List downloaded artifacts
        run: ls -laR artifacts/

      - name: Get version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-dev" >> $GITHUB_OUTPUT
            echo "tag=v0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - name: Identify artifacts
        id: artifacts
        run: |
          cd artifacts
          NSIS_ZIP=$(ls *.nsis.zip 2>/dev/null | head -1)
          NSIS_SIG=$(ls *.nsis.zip.sig 2>/dev/null | head -1)
          INSTALLER=$(ls *.exe 2>/dev/null | head -1)

          echo "nsis_zip=artifacts/$NSIS_ZIP" >> $GITHUB_OUTPUT
          echo "nsis_sig=artifacts/$NSIS_SIG" >> $GITHUB_OUTPUT
          echo "installer=artifacts/$INSTALLER" >> $GITHUB_OUTPUT
          echo "nsis_zip_name=$NSIS_ZIP" >> $GITHUB_OUTPUT

          echo "Found zip=$NSIS_ZIP sig=$NSIS_SIG exe=$INSTALLER"

          if [ -z "$NSIS_SIG" ]; then
            echo "ERROR: No .nsis.zip.sig file found!"
            exit 1
          fi

      - name: Generate latest.json
        run: |
          SIG=$(cat "${{ steps.artifacts.outputs.nsis_sig }}")
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="${{ steps.artifacts.outputs.nsis_zip_name }}"

          cat > latest.json <<EOJSON
          {
            "version": "$VERSION",
            "notes": "Release $TAG",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIG",
                "url": "https://github.com/TryNudge/desktop/releases/download/$TAG/$ZIP_NAME"
              }
            }
          }
          EOJSON
          echo "--- latest.json ---"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Nudge ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            ${{ steps.artifacts.outputs.installer }}
            ${{ steps.artifacts.outputs.nsis_zip }}
            ${{ steps.artifacts.outputs.nsis_sig }}
            latest.json
          generate_release_notes: true
