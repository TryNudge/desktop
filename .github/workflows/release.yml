name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

  publish-release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: artifacts

      - name: Get version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-dev" >> $GITHUB_OUTPUT
            echo "tag=v0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - name: Find build artifacts
        id: artifacts
        run: |
          NSIS_ZIP=$(find artifacts -name "*.nsis.zip" | head -1)
          NSIS_SIG=$(find artifacts -name "*.nsis.zip.sig" | head -1)
          INSTALLER=$(find artifacts -name "*.exe" | head -1)
          echo "nsis_zip=$NSIS_ZIP" >> $GITHUB_OUTPUT
          echo "nsis_sig=$NSIS_SIG" >> $GITHUB_OUTPUT
          echo "installer=$INSTALLER" >> $GITHUB_OUTPUT
          echo "Found: $NSIS_ZIP, $NSIS_SIG, $INSTALLER"

      - name: Read signature
        id: sig
        run: |
          SIG=$(cat "${{ steps.artifacts.outputs.nsis_sig }}")
          echo "signature=$SIG" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        run: |
          cat > latest.json << EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "notes": "Release ${{ steps.version.outputs.tag }}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${{ steps.sig.outputs.signature }}",
                "url": "https://github.com/TryNudge/desktop/releases/download/${{ steps.version.outputs.tag }}/$(basename ${{ steps.artifacts.outputs.nsis_zip }})"
              }
            }
          }
          EOF
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Nudge ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            ${{ steps.artifacts.outputs.installer }}
            ${{ steps.artifacts.outputs.nsis_zip }}
            ${{ steps.artifacts.outputs.nsis_sig }}
            latest.json
          generate_release_notes: true
