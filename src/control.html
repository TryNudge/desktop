<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="control.css">
</head>
<body>
<div class="control-bar">
  <div class="step-badge">
    <div id="step-dot" class="step-dot"></div>
    <span id="counter">Step 1</span>
  </div>
  <div class="divider"></div>
  <button id="btn-next" class="btn-next">Next step<span class="kbd" id="hint-next"></span></button>
  <button id="btn-dismiss" class="btn-dismiss">Done<span class="kbd" id="hint-dismiss"></span></button>
</div>

<script src="control.js"></script>
</body>
</html>
