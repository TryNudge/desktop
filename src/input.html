<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="input.css">
</head>
<body>
<div class="input-container">
  <div class="logo-wrapper">
    <img class="nudge-icon" src="nudgekeycap.png" alt="Nudge" />
    <div class="mode-dropdown">
      <div class="mode-option">
        <svg class="mode-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <span class="mode-label">Research</span>
        <label class="mode-toggle">
          <input type="checkbox" id="research-toggle" />
          <span class="mode-slider"></span>
        </label>
      </div>
    </div>
  </div>
  <input id="query" type="text" placeholder="Ask Nudge anything..." autofocus spellcheck="false" autocomplete="off" />
  <span id="hint" class="hint">Enter &crarr;</span>
  <div id="spinner" class="spinner"></div>
</div>
<script src="input.js"></script>
</body>
</html>
