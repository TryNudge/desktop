<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: transparent !important; }
  body {
    background: rgb(20, 20, 24) !important;
    font-family: 'Inter', system-ui, sans-serif;
    color: rgba(255,255,255,0.9);
    overflow: hidden;
  }

  .window {
    background: rgb(20, 20, 24);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Title bar ── */
  .titlebar {
    display: flex;
    align-items: center;
    padding: 16px 20px 12px;
    gap: 12px;
    -webkit-app-region: drag;
  }
  .titlebar img {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    -webkit-app-region: no-drag;
  }
  .titlebar h1 {
    font-size: 16px;
    font-weight: 700;
    flex: 1;
    letter-spacing: -0.3px;
  }
  .titlebar .version {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    font-weight: 500;
  }
  .close-btn {
    -webkit-app-region: no-drag;
    width: 28px;
    height: 28px;
    border: none;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    color: rgba(255,255,255,0.4);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .close-btn:hover { background: rgba(255,60,60,0.15); color: rgba(255,100,100,0.9); }

  /* ── Content ── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px 20px;
  }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  /* ── Sections ── */
  .section {
    margin-bottom: 20px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 14px 16px;
  }

  /* ── Input field ── */
  .field {
    margin-bottom: 12px;
  }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
  }
  .field input[type="text"],
  .field input[type="password"] {
    width: 100%;
    padding: 9px 12px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: rgba(255,255,255,0.9);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus {
    border-color: rgba(255,255,255,0.18);
  }
  .field input::placeholder {
    color: rgba(255,255,255,0.2);
  }
  .field-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    margin-top: 4px;
  }

  /* ── Toggle row ── */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-label {
    font-size: 13px;
    font-weight: 500;
  }
  .toggle-desc {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    margin-top: 2px;
  }

  /* Toggle switch */
  .toggle {
    position: relative;
    width: 40px;
    height: 22px;
    flex-shrink: 0;
  }
  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .toggle .slider {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle .slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 3px;
    top: 3px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .slider {
    background: rgba(43, 43, 43, 0.9);
  }
  .toggle input:checked + .slider::before {
    transform: translateX(18px);
    background: white;
  }

  /* ── Keybind buttons ── */
  .keybind-btn {
    padding: 5px 12px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: all 0.15s ease;
    min-width: 80px;
    text-align: center;
  }
  .keybind-btn:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.8);
  }
  .keybind-btn.recording {
    background: rgba(80, 120, 255, 0.15);
    border-color: rgba(80, 120, 255, 0.4);
    color: rgba(180, 200, 255, 0.9);
    animation: pulse-border 1.5s ease-in-out infinite;
  }
  @keyframes pulse-border {
    0%, 100% { border-color: rgba(80, 120, 255, 0.4); }
    50% { border-color: rgba(80, 120, 255, 0.7); }
  }

  /* ── Save status ── */
  .save-status {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    padding: 8px;
    transition: opacity 0.3s;
  }
  .save-status.saved { color: rgba(120, 220, 120, 0.6); }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <img src="nudgekeycap.png" alt="Nudge" />
    <h1>Nudge</h1>
    <span class="version">v0.1.0</span>
    <button class="close-btn" id="close-btn">&times;</button>
  </div>

  <div class="content">
    <!-- Account -->
    <div class="section">
      <div class="section-title">Account</div>
      <div class="card">
        <div id="auth-logged-out">
          <div class="toggle-row">
            <div>
              <div class="toggle-label">Not signed in</div>
              <div class="toggle-desc">Sign in to use cloud features</div>
            </div>
            <button id="btn-login" style="background:rgba(255,255,255,0.9);color:#000;border:none;border-radius:8px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;">Sign In</button>
          </div>
        </div>
        <div id="auth-logged-in" style="display:none">
          <div class="toggle-row">
            <div>
              <div class="toggle-label" id="user-email">user@example.com</div>
              <div class="toggle-desc" id="usage-info">0 / 50 queries used</div>
            </div>
            <button id="btn-logout" style="background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">Sign Out</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Grounding -->
    <div class="section">
      <div class="section-title">Grounding</div>
      <div class="card">
        <div class="toggle-row">
          <div>
            <div class="toggle-label">UI Automation</div>
            <div class="toggle-desc">Pixel-perfect for native apps</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="toggle-uia" checked />
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <div>
            <div class="toggle-label">OCR Text Match</div>
            <div class="toggle-desc">Find text labels on screen</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="toggle-ocr" checked />
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- Keybinds -->
    <div class="section">
      <div class="section-title">Keybinds</div>
      <div class="card">
        <div class="toggle-row">
          <div><div class="toggle-label">Open Nudge</div></div>
          <button class="keybind-btn" id="kb-open-nudge" data-action="open_nudge">Ctrl+Shift+N</button>
        </div>
        <div class="toggle-row">
          <div><div class="toggle-label">Next Step</div></div>
          <button class="keybind-btn" id="kb-next-step" data-action="next_step">Ctrl+Shift+&rarr;</button>
        </div>
        <div class="toggle-row">
          <div><div class="toggle-label">Dismiss</div></div>
          <button class="keybind-btn" id="kb-dismiss" data-action="dismiss">Ctrl+Shift+&larr;</button>
        </div>
      </div>
    </div>

    <!-- Updates -->
    <div class="section">
      <div class="section-title">Updates</div>
      <div class="card">
        <div class="toggle-row">
          <div>
            <div class="toggle-label" id="update-label">v0.1.0</div>
            <div class="toggle-desc" id="update-desc">Checking for updates...</div>
          </div>
          <button id="btn-update" style="display:none;background:rgba(80,120,255,0.15);color:rgba(160,180,255,0.9);border:1px solid rgba(80,120,255,0.3);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;">Update</button>
        </div>
      </div>
    </div>

    <div id="save-status" class="save-status">Settings auto-save</div>
  </div>
</div>

<script>
  const { invoke } = window.__TAURI__.core;
  const { getCurrentWindow } = window.__TAURI__.window;
  const { listen } = window.__TAURI__.event;

  const toggleUia = document.getElementById('toggle-uia');
  const toggleOcr = document.getElementById('toggle-ocr');
  const saveStatus = document.getElementById('save-status');

  // Auth elements
  const authLoggedOut = document.getElementById('auth-logged-out');
  const authLoggedIn = document.getElementById('auth-logged-in');
  const userEmail = document.getElementById('user-email');
  const usageInfo = document.getElementById('usage-info');
  const btnLogin = document.getElementById('btn-login');
  const btnLogout = document.getElementById('btn-logout');

  // Close
  document.getElementById('close-btn').addEventListener('click', () => getCurrentWindow().hide());

  // Auth state
  async function updateAuthUI() {
    try {
      const state = await invoke('get_auth_state');
      if (state.authenticated) {
        authLoggedOut.style.display = 'none';
        authLoggedIn.style.display = 'block';
        userEmail.textContent = state.email || 'Signed in';
        usageInfo.textContent = state.plan === 'pro' ? 'Pro plan' : 'Free plan';
      } else {
        authLoggedOut.style.display = 'block';
        authLoggedIn.style.display = 'none';
      }
    } catch (e) {
      console.error('auth state error:', e);
    }
  }

  btnLogin.addEventListener('click', () => invoke('login').catch(console.error));
  btnLogout.addEventListener('click', async () => {
    await invoke('logout').catch(console.error);
    updateAuthUI();
  });

  // Listen for auth-success from deep link
  listen('auth-success', () => updateAuthUI());

  // Check auth on load
  updateAuthUI();

  // Grounding toggles
  function updateGrounding() {
    invoke('set_grounding', {
      settings: JSON.stringify({
        uia: toggleUia.checked,
        ocr: toggleOcr.checked,
      })
    }).catch(console.error);
    showSaved();
  }
  toggleUia.addEventListener('change', updateGrounding);
  toggleOcr.addEventListener('change', updateGrounding);

  function showSaved() {
    saveStatus.textContent = 'Saved';
    saveStatus.classList.add('saved');
    setTimeout(() => {
      saveStatus.textContent = 'Settings auto-save';
      saveStatus.classList.remove('saved');
    }, 1500);
  }

  // ── Keybind recording ──
  const KEY_MAP = {
    'Control': 'ctrl', 'Shift': 'shift', 'Alt': 'alt', 'Meta': 'super',
    'ArrowRight': 'arrowright', 'ArrowLeft': 'arrowleft',
    'ArrowUp': 'arrowup', 'ArrowDown': 'arrowdown',
    'Enter': 'enter', 'Escape': 'escape', 'Backspace': 'backspace',
    'Delete': 'delete', 'Tab': 'tab', 'Space': 'space',
    ' ': 'space',
  };

  const DISPLAY_MAP = {
    'ctrl': 'Ctrl', 'shift': 'Shift', 'alt': 'Alt', 'super': 'Super',
    'arrowright': '\u2192', 'arrowleft': '\u2190',
    'arrowup': '\u2191', 'arrowdown': '\u2193',
    'enter': '\u21B5', 'escape': 'Esc', 'backspace': '\u232B',
    'delete': 'Del', 'tab': 'Tab', 'space': 'Space',
  };

  function shortcutToDisplay(shortcut) {
    return shortcut.split('+').map(p => DISPLAY_MAP[p] || p.toUpperCase()).join('+');
  }

  let recordingBtn = null;

  let recordingAction = null;

  async function startRecording(btn) {
    if (recordingAction) {
      // Cancel previous recording
      document.querySelectorAll('.keybind-btn').forEach(b => b.classList.remove('recording'));
      try { await invoke('resume_shortcuts'); } catch(e) {}
    }
    recordingAction = btn.dataset.action;
    btn.classList.add('recording');
    btn.textContent = 'Press keys...';
    // Blur the button so keydown goes to document
    btn.blur();
    // Pause all global shortcuts so they don't intercept our keypresses
    try { await invoke('pause_shortcuts'); } catch(e) { console.error(e); }
  }

  document.querySelectorAll('.keybind-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      startRecording(btn);
    });
  });

  window.addEventListener('keydown', async (e) => {
    if (!recordingAction) return;
    e.preventDefault();
    e.stopPropagation();
    e.stopImmediatePropagation();

    // Ignore lone modifier keys
    if (['Control', 'Shift', 'Alt', 'Meta'].includes(e.key)) return;

    const action = recordingAction;
    const btn = document.querySelector(`.keybind-btn[data-action="${action}"]`);

    // Escape cancels recording
    if (e.key === 'Escape') {
      recordingAction = null;
      btn.classList.remove('recording');
      loadKeybinds();
      try { await invoke('resume_shortcuts'); } catch(ex) {}
      return;
    }

    // Require at least one modifier
    if (!e.ctrlKey && !e.shiftKey && !e.altKey && !e.metaKey) return;

    const parts = [];
    if (e.ctrlKey) parts.push('ctrl');
    if (e.shiftKey) parts.push('shift');
    if (e.altKey) parts.push('alt');
    if (e.metaKey) parts.push('super');

    const key = KEY_MAP[e.key] || e.key.toLowerCase();
    parts.push(key);

    const shortcut = parts.join('+');

    try {
      await invoke('set_keybind', { action, shortcut });
      btn.classList.remove('recording');
      btn.textContent = shortcutToDisplay(shortcut);
      recordingAction = null;
      try { await invoke('resume_shortcuts'); } catch(ex) {}
      showSaved();
    } catch (err) {
      btn.textContent = String(err).slice(0, 30);
      btn.classList.remove('recording');
      recordingAction = null;
      setTimeout(() => loadKeybinds(), 1500);
      try { await invoke('resume_shortcuts'); } catch(ex) {}
    }
  }, true);

  async function loadKeybinds() {
    try {
      const kb = await invoke('get_keybinds');
      document.getElementById('kb-open-nudge').textContent = shortcutToDisplay(kb.open_nudge);
      document.getElementById('kb-next-step').textContent = shortcutToDisplay(kb.next_step);
      document.getElementById('kb-dismiss').textContent = shortcutToDisplay(kb.dismiss);
    } catch (e) {
      console.error('load keybinds error:', e);
    }
  }
  loadKeybinds();

  // ── Update check ──
  const updateLabel = document.getElementById('update-label');
  const updateDesc = document.getElementById('update-desc');
  const btnUpdate = document.getElementById('btn-update');

  async function checkUpdate() {
    try {
      const info = await invoke('check_for_update');
      if (info.available) {
        updateLabel.textContent = `v${info.version} available`;
        updateDesc.textContent = info.notes || 'A new version is ready to install.';
        btnUpdate.style.display = '';
      } else {
        updateLabel.textContent = 'v0.1.0';
        updateDesc.textContent = 'You\u2019re on the latest version.';
      }
    } catch (e) {
      updateDesc.textContent = 'Could not check for updates.';
    }
  }

  btnUpdate.addEventListener('click', async () => {
    btnUpdate.disabled = true;
    btnUpdate.textContent = 'Updating...';
    updateDesc.textContent = 'Downloading update...';
    try {
      await invoke('install_update');
    } catch (e) {
      updateDesc.textContent = `Update failed: ${e}`;
      btnUpdate.textContent = 'Retry';
      btnUpdate.disabled = false;
    }
  });

  checkUpdate();
</script>
</body>
</html>
