<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="settings.css">
</head>
<body>
<div class="window">
  <div class="titlebar">
    <img src="nudgekeycap.png" alt="Nudge" />
    <h1>Nudge</h1>
    <span class="version">v0.1.0</span>
    <button class="close-btn" id="close-btn">&times;</button>
  </div>

  <div class="content">
    <!-- Account -->
    <div class="section">
      <div class="section-title">Account</div>
      <div class="card">
        <div id="auth-logged-out">
          <div class="toggle-row">
            <div>
              <div class="toggle-label">Not signed in</div>
              <div class="toggle-desc">Sign in to use cloud features</div>
            </div>
            <button id="btn-login" style="background:rgba(255,255,255,0.9);color:#000;border:none;border-radius:8px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;">Sign In</button>
          </div>
        </div>
        <div id="auth-logged-in" style="display:none">
          <div class="toggle-row">
            <div>
              <div class="toggle-label" id="user-email">user@example.com</div>
              <div class="toggle-desc" id="usage-info">0 / 50 queries used</div>
            </div>
            <button id="btn-logout" style="background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">Sign Out</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Grounding -->
    <div class="section">
      <div class="section-title">Grounding</div>
      <div class="card">
        <div class="toggle-row">
          <div>
            <div class="toggle-label">UI Automation</div>
            <div class="toggle-desc">Pixel-perfect for native apps</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="toggle-uia" checked />
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <div>
            <div class="toggle-label">OCR Text Match</div>
            <div class="toggle-desc">Find text labels on screen</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="toggle-ocr" checked />
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- Keybinds -->
    <div class="section">
      <div class="section-title">Keybinds</div>
      <div class="card">
        <div class="toggle-row">
          <div><div class="toggle-label">Open Nudge</div></div>
          <button class="keybind-btn" id="kb-open-nudge" data-action="open_nudge">Ctrl+Shift+N</button>
        </div>
        <div class="toggle-row">
          <div><div class="toggle-label">Next Step</div></div>
          <button class="keybind-btn" id="kb-next-step" data-action="next_step">Ctrl+Shift+&rarr;</button>
        </div>
        <div class="toggle-row">
          <div><div class="toggle-label">Dismiss</div></div>
          <button class="keybind-btn" id="kb-dismiss" data-action="dismiss">Ctrl+Shift+&larr;</button>
        </div>
      </div>
    </div>

    <!-- Updates -->
    <div class="section">
      <div class="section-title">Updates</div>
      <div class="card">
        <div class="toggle-row">
          <div>
            <div class="toggle-label" id="update-label">v0.1.0</div>
            <div class="toggle-desc" id="update-desc">Checking for updates...</div>
          </div>
          <button id="btn-update" style="display:none;background:rgba(80,120,255,0.15);color:rgba(160,180,255,0.9);border:1px solid rgba(80,120,255,0.3);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;">Update</button>
        </div>
      </div>
    </div>

    <div id="save-status" class="save-status">Settings auto-save</div>
  </div>
</div>

<script src="settings.js"></script>
</body>
</html>
